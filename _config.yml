# ═══════════════════════════════════════════════════════════
#  _config.yml — RxMedCalc (thezerowhisper.github.io)
#  Jekyll configuration for GitHub Pages
# ═══════════════════════════════════════════════════════════

# ── SITE IDENTITY ──────────────────────────────────────────
title: "RxMedCalc"
description: "Free clinical calculators for Indian doctors. CURB-65, NEWS2, GCS, eGFR, ARV dose, IV drip rate, BMI and more. Built by a doctor. No login required."
url: "https://thezerowhisper.github.io"
baseurl: ""
lang: "en-IN"

# ── PERMALINKS ─────────────────────────────────────────────
# "none" gives clean URLs WITHOUT trailing slash:
#   curb65.html  →  /medical-calculators/curb65
# This matches your existing canonical tags exactly.
permalink: none

# ── EXCLUDE FROM JEKYLL PROCESSING ────────────────────────
# These files are served as-is. Jekyll should NOT touch them
# because they contain special characters or JS that Jekyll
# might misinterpret as Liquid template syntax ({{ }}, {% %}).
exclude:
  - shared-nav.js
  - shared.css
  - assets/umami-events.js
  - README.md
  - node_modules/
  - "*.json"
  - "*.py"
  - Gemfile
  - Gemfile.lock

# ── INCLUDE HIDDEN FILES IF NEEDED ────────────────────────
# include:
#   - .htaccess

# ── MARKDOWN ENGINE ────────────────────────────────────────
markdown: kramdown
highlighter: rouge

# ── DEFAULTS (optional — stops Jekyll adding layouts) ──────
defaults:
  - scope:
      path: ""
    values:
      layout: null

# ── PLUGINS (GitHub Pages safe whitelist) ─────────────────
plugins:
  - jekyll-seo-tag
 # - jekyll-sitemap

# jekyll-sitemap will auto-generate /sitemap.xml listing
# all your pages — great for Google Search Console.

# ── SITEMAP EXCLUSIONS ────────────────────────────────────
# Pages you do NOT want in the sitemap:
sitemap:
  exclude:
    - /404.html
    - /privacy
    - /contact

# ── SASS (if you ever move shared.css to .scss) ───────────
# sass:
#   style: compressed

# ═══════════════════════════════════════════════════════════
#  AFTER ADDING THIS FILE:
#  1. Commit and push to GitHub
#  2. GitHub Pages rebuilds automatically (takes ~1 min)
#  3. Test: visit /medical-calculators/curb65 (no .html)
#  4. Old .html URLs still work — Jekyll serves both
#  5. Update any internal links that still use .html
# ═══════════════════════════════════════════════════════════
