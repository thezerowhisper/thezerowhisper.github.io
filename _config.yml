# ═══════════════════════════════════════════════════════════
#  _config.yml — RxMedCalc (thezerowhisper.github.io)
#  Jekyll configuration for GitHub Pages
# ═══════════════════════════════════════════════════════════

# ── SITE IDENTITY ──────────────────────────────────────────
title: "RxMedCalc"
description: "Free clinical calculators for Indian doctors. CURB-65, NEWS2, GCS, eGFR, ARV dose, IV drip rate, BMI and more. Built by a doctor. No login required."
url: "https://thezerowhisper.github.io"
baseurl: ""
lang: "en-IN"

# ── PERMALINKS ─────────────────────────────────────────────
# "none" gives clean URLs WITHOUT trailing slash:
#   curb65.html  →  /medical-calculators/curb65
# This matches your existing canonical tags exactly.
permalink: none

# ── EXCLUDE FROM JEKYLL PROCESSING ────────────────────────
# Only exclude files that should NOT be copied to _site/
# REMOVED: shared.css and shared-nav.js (they need to be served!)
exclude:
  - assets/umami-events.js
  - README.md
  - node_modules/
  - "*.json"
  - "*.py"
  - Gemfile
  - Gemfile.lock

# ── INCLUDE FILES IN OUTPUT ────────────────────────────────
# Explicitly ensure these static files are copied to _site/
include:
  - shared.css
  - shared-nav.js
  - assets/

# ── MARKDOWN ENGINE ────────────────────────────────────────
markdown: kramdown
highlighter: rouge

# ── DEFAULTS (stops Jekyll adding unwanted layouts) ────────
defaults:
  - scope:
      path: ""
    values:
      layout: null

# ── PLUGINS (GitHub Pages safe whitelist) ─────────────────
plugins:
  - jekyll-seo-tag
  # - jekyll-sitemap
  # Uncomment jekyll-sitemap to auto-generate /sitemap.xml

# ── SITEMAP EXCLUSIONS ─────────────────────────────────
# Pages you do NOT want in the sitemap:
sitemap:
  exclude:
    - /404.html
    - /privacy
    - /contact

# ── SASS (if you ever move shared.css to .scss) ───────────
# sass:
#   style: compressed

# ═══════════════════════════════════════════════════════════
#  DEPLOYMENT CHECKLIST:
#
#  1. Replace your current _config.yml with this file
#  2. Make sure shared.css exists in your repo root
#  3. Make sure shared-nav.js exists in your repo root
#  4. Make sure assets/ folder exists with umami-events.js
#  5. Commit all files:
#     git add _config.yml shared.css shared-nav.js
#     git commit -m "Fix: include CSS and JS in Jekyll output"
#     git push origin main
#  6. GitHub Pages rebuilds (~1 min) — check Actions tab
#  7. Test: Visit https://thezerowhisper.github.io/medical-calculators/wells-score
#  8. Open DevTools (F12) → Console → check for 404s
#  9. CSS should load correctly now!
#
# ═══════════════════════════════════════════════════════════
