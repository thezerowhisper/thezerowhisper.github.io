name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate sitemap
        run: |
          DOMAIN="https://rxmedcalc.com"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Add homepage
          echo "<url><loc>$DOMAIN/</loc><priority>1.0</priority></url>" >> sitemap.xml

          # Loop through all HTML files
          for file in $(find . -name "*.html"); do

            # Clean path
            path=$(echo $file | sed 's|^\./||' | sed 's|/index.html$||' | sed 's|\.html$||')

            # Skip unwanted files
            if [[ "$path" == "" || "$path" == "404" ]]; then
              continue
            fi

            url="$DOMAIN/$path"

            echo "<url><loc>$url</loc><priority>0.64</priority></url>" >> sitemap.xml

          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Auto update sitemap" || echo "No changes"
          git push
