name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate sitemap
        run: |
          DOMAIN="https://rxmedcalc.com"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # 1. Add homepage (1.0)
          echo "<url><loc>$DOMAIN/</loc><priority>1.0</priority></url>" >> sitemap.xml

          # 2. Loop through all HTML files
          for file in $(find . -name "*.html" -not -path '*/.*'); do

            # Clean path: remove ./, remove index.html, remove .html extension
            # This logic turns "./medical-calculators/index.html" into "medical-calculators"
            path=$(echo $file | sed 's|^\./||' | sed 's|/index.html$||' | sed 's|index.html$||' | sed 's|\.html$||')

            # --- DEDUPLICATION LOGIC ---
            # If path is empty (it was the root index) or is specifically "index", skip it 
            # because we already added the homepage manually above.
            if [[ "$path" == "" || "$path" == "index" || "$path" == "404" ]]; then
              continue
            fi

            url="$DOMAIN/$path"
            
            # Dynamic Priority
            if [[ "$path" == "medical-calculators" || "$path" == "drug-doses" ]]; then
              priority="0.8"
            else
              priority="0.64"
            fi

            echo "<url><loc>$url</loc><priority>$priority</priority></url>" >> sitemap.xml

          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Auto update sitemap [Deduplicated Clean URLs]" || echo "No changes"
          git push
