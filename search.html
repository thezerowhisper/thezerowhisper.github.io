let activeFilter='all';
let lastQuery='';

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active',c.textContent.includes(cat)||cat==='all'&&c.textContent==='All');
  });
  renderResults(document.getElementById('search-input').value.trim());
}

function highlight(text,query){
  if(!query)return text;
  const re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function score(tool,q){
  if(!q)return 1;
  const ql=q.toLowerCase();
  const tl=tool.title.toLowerCase();
  const dl=tool.desc.toLowerCase();
  const tags=tool.tags.join(' ').toLowerCase();
  if(tl===ql)return 100;
  if(tl.startsWith(ql))return 90;
  if(tl.includes(ql))return 80;
  if(tags.includes(ql))return 70;
  if(dl.includes(ql))return 50;
  // fuzzy: check each word
  const words=ql.split(/\s+/);
  let sc=0;
  words.forEach(w=>{
    if(tl.includes(w))sc+=30;
    else if(tags.includes(w))sc+=20;
    else if(dl.includes(w))sc+=10;
  });
  return sc;
}

function renderResults(query){
  lastQuery=query;
  const container=document.getElementById('results-container');
  let filtered=TOOLS;

  // Category filter
  if(activeFilter!=='all'){
    filtered=filtered.filter(t=>t.cat===activeFilter);
  }

  // Search filter
  if(query.length>=1){
    filtered=filtered.map(t=>({...t,_score:score(t,query)})).filter(t=>t._score>0).sort((a,b)=>b._score-a._score);
  }

  document.getElementById('count-num').textContent=filtered.length;

  if(filtered.length===0){
    container.innerHTML=`<div class="no-results"><h3>No results for "${query}"</h3><p>Try searching by condition (e.g. "AKI"), drug (e.g. "gentamicin"), or specialty (e.g. "cardiac").<br><br>Or browse all calculators at <a href="/medical-calculators/" style="color:#3b82f6">medical calculators</a>.</p></div>`;
    return;
  }

  // Group by category if no search query
  if(!query&&activeFilter==='all'){
    const cats=['Emergency','Cardiac','Renal','Paediatrics','General','Obstetrics','Mental Health','Pulmonary'];
    let html='';
    cats.forEach(cat=>{
      const tools=filtered.filter(t=>t.cat===cat);
      if(!tools.length)return;
      html+=`<div class="cat-header">${cat}</div>`;
      tools.forEach(t=>{html+=renderCard(t,'')});
    });
    container.innerHTML=html;
  } else {
    container.innerHTML=filtered.map(t=>renderCard(t,query)).join('');
  }

  if(typeof umami!=='undefined'&&query.length>2)umami.track('search',{query,results:filtered.length});
}

function renderCard(t,q){
  const newBadge=t.new?`<span style="display:inline-block;background:#dcfce7;color:#16a34a;border:1px solid #86efac;font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle">NEW</span>`:'';
  return `<a href="${t.url}" class="result-card" style="--cat-color:${t.color}">
    <div class="rc-icon-wrap" style="background:${t.bg}">${t.icon}</div>
    <div class="rc-content">
      <div class="rc-cat">${t.cat}</div>
      <div class="rc-title">${highlight(t.title,q)}${newBadge}</div>
      <div class="rc-desc">${highlight(t.desc,q)}</div>
      <div class="rc-tags">${t.tags.slice(0,4).map(tag=>`<span class="rc-tag">${highlight(tag,q)}</span>`).join('')}</div>
    </div>
    <div class="rc-arrow">›</div>
  </a>`;
}

// Init
renderResults('');

// Search input
document.getElementById('search-input').addEventListener('input',e=>{
  renderResults(e.target.value.trim());
});

// URL param support: /search?q=qtc
const urlQ=new URLSearchParams(location.search).get('q');
if(urlQ){document.getElementById('search-input').value=urlQ;renderResults(urlQ);}
</script>
