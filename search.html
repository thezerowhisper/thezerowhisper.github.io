let activeFilter='all';
function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    const label=c.textContent.trim();
    const isAll=label==='All';
    c.classList.toggle('active', f==='all'?isAll:label.includes(f));
  });
  render();
}
function render(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const filtered=T.filter(t=>{
    const mc=activeFilter==='all'||t.c===activeFilter;
    if(!mc)return false;
    if(!q)return true;
    return t.t.toLowerCase().includes(q)||t.d.toLowerCase().includes(q)||t.g.some(g=>g.toLowerCase().includes(q));
  });
  document.getElementById('count-num').textContent=filtered.length;
  const nr=document.getElementById('no-results');
  const rc=document.getElementById('results-container');
  if(!filtered.length){
    nr.style.display='block';
    document.getElementById('no-q').textContent=q;
    rc.innerHTML='';
  } else {
    nr.style.display='none';
    rc.innerHTML=filtered.map(t=>`<a href="${t.u}" class="tool-card" style="--cc:${t.col}"><div class="tc-icon">${t.i}</div><div class="tc-cat">${t.c}</div><div class="tc-title">${t.t}</div><div class="tc-desc">${t.d}</div>${t.n?'<span class="tc-new">New</span>':''}</a>`).join('');
  }
}
document.getElementById('search-input').addEventListener('input',render);
const urlQ=new URLSearchParams(location.search).get('q');
if(urlQ)document.getElementById('search-input').value=urlQ;
render();
</script>
