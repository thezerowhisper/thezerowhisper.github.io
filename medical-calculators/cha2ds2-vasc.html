<!DOCTYPE html>
<html lang="en" data-tool="cha2ds2-vasc">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CHA₂DS₂-VASc Score Calculator | RxMedCalc</title>

<link rel="stylesheet" href="/assets/shared.css"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:#f8f6f2;
  color:#1a1a2e;
  overflow-x:hidden
}

/* HEADER */
.page-header{
  background:linear-gradient(135deg,#0d1b2a 0%,#1a1535 60%,#0d1b2a 100%);
  padding:40px 0 0;
  position:relative;
  overflow:hidden
}
.page-header::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(239,68,68,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(239,68,68,0.05) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:0.4; /* FIXED */
}

.header-inner{max-width:900px;margin:0 auto;padding:0 24px}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:36px 24px 80px}

/* CARD */
.calc-card{
  background:#fff;
  border:1.5px solid #e5e7eb;
  border-radius:20px;
  padding:32px;
  margin-bottom:28px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06)
}

/* CRITERIA */
.criteria{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}

.criterion{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#f9fafb;
  border:1.5px solid #e5e7eb;
  border-radius:12px;
  padding:14px 18px;
  cursor:pointer;
  transition:all 0.2s;
  gap:12px;
  min-height:64px; /* FIX */
}

.criterion:hover{
  border-color:#ef4444;
  background:#fff;
}

.criterion.sel{
  background:#fef2f2;
  border-color:#ef4444;
  box-shadow:0 2px 8px rgba(239,68,68,0.15); /* IMPROVED */
}

.criterion-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:0; /* FIX */
}

.crit-letter{
  width:30px;height:30px;
  background:#fee2e2;color:#ef4444;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:0.9rem;
  flex-shrink:0
}

.criterion.sel .crit-letter{background:#ef4444;color:#fff}

.crit-name{
  font-size:0.88rem;
  font-weight:600;
  color:#0d1b2a;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.crit-desc{
  font-size:0.72rem;
  color:#6b7280;
}

.crit-points{
  font-size:1.4rem;
  font-weight:900;
  color:#d1d5db;
  flex-shrink:0
}

.criterion.sel .crit-points{color:#ef4444}

/* SCORE */
.score-big{
  font-size:clamp(2.5rem,8vw,5rem); /* FIX */
  font-weight:900;
  color:#ef4444
}

/* GRID */
.result-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

@media(max-width:500px){
  .result-grid{
    grid-template-columns:1fr; /* FIX */
  }
}

/* FAQ */
.faq-item.open .faq-a{
  max-height:600px; /* FIX */
  padding-top:10px
}

/* BUTTONS */
.action-row{
  display:flex;
  gap:10px;
  margin-top:16px; /* FIX */
}

</style>
</head>

<body>

<div class="page-header">
  <div class="header-inner">
    <h1 style="color:white">CHA₂DS₂-VASc Calculator</h1>
  </div>
</div>

<main class="main">

<div class="calc-card">

<div class="criteria" id="criteria-container"></div>

<div style="margin:20px 0;font-weight:bold">
Score: <span id="rt-val">0</span>
</div>

<button onclick="calculate()">Calculate</button>

<div id="results" style="display:none;margin-top:20px">
  <div class="score-big" id="score-big">0</div>
</div>

</div>
</main>

<script>
const CRITERIA=[
  {name:'Heart Failure',points:1},
  {name:'Hypertension',points:1},
  {name:'Age ≥75',points:2},
  {name:'Diabetes',points:1},
  {name:'Stroke/TIA',points:2},
  {name:'Vascular Disease',points:1},
  {name:'Age 65–74',points:1},
  {name:'Female Sex',points:1}
];

let selected=new Set();

function build(){
  document.getElementById('criteria-container').innerHTML=
    CRITERIA.map((c,i)=>`
      <div class="criterion ${selected.has(i)?'sel':''}" onclick="toggle(${i})">
        <div class="criterion-left">
          <div class="crit-letter">${c.name[0]}</div>
          <div>
            <div class="crit-name">${c.name}</div>
          </div>
        </div>
        <div class="crit-points">+${c.points}</div>
      </div>
    `).join('');
}

function toggle(i){
  if(selected.has(i)) selected.delete(i);
  else selected.add(i);

  build();

  let total=0;
  selected.forEach(i=>total+=CRITERIA[i].points);

  document.getElementById('rt-val').textContent=total;
}

function calculate(){
  let total=0;
  selected.forEach(i=>total+=CRITERIA[i].points);

  document.getElementById('score-big').textContent=total;
  document.getElementById('results').style.display='block';
}

build();
</script>

</body>
</html>
