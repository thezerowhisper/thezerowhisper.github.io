<script>
  var path = window.location.pathname.toLowerCase();

  var assetExtensions = [
    '.css', '.js', '.png', '.jpg', '.jpeg', '.gif',
    '.svg', '.ico', '.webp', '.json', '.txt'
  ];

  var isAsset = assetExtensions.some(ext => path.endsWith(ext));

  // 🚨 ONLY redirect if NOT asset AND NOT file request
  if (!isAsset && !path.includes('.')) {
    window.location.replace("https://thezerowhisper.github.io/");
  }
</script>

<script src="/assets/shared-nav.js"></script>
